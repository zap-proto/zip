# ~7-line canonical caller — all real config lives in /hanzo.yml.
# Runs on OUR zap-proto arc scale set (never a GitHub-hosted runner).
name: CI/CD
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
jobs:
  cicd:
    uses: hanzoai/ci/.github/workflows/build.yml@5ee1b857de4600d3b08d1f1f69fd349e9a43c331
    with:
      runner: '["zap-proto-build-linux-amd64"]'
    secrets: inherit
